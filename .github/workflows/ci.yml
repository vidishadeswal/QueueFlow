name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: queueflow
          POSTGRES_PASSWORD: queueflow
          # conftest.py derives the test DB URL from DATABASE_URL by swapping in
          # "queueflow_test" as the db name, so that's the database that needs
          # to exist here -- the app's own migrations/schema aren't used in CI.
          POSTGRES_DB: queueflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U queueflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://queueflow:queueflow@localhost:5432/queueflow
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-only-placeholder-secret-not-used-in-production

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check app scripts

      - name: Test
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
